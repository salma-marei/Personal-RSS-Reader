<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Feed Reader</title>
  <link rel="stylesheet" href="styles.css?v=20260715-53">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">
          <svg class="ui-icon" viewBox="0 0 24 24"><path d="M4 22h16a2 2 0 0 0 2-2V4H10v16a2 2 0 0 1-4 0V2H2v18a2 2 0 0 0 2 2Z"/><path d="M14 8h4"/><path d="M14 12h4"/><path d="M14 16h4"/></svg>
        </span>
        <span class="brand-name">Feed Reader</span>
      </div>

      <div class="sidebar-feed-search">
        <svg class="ui-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="sidebar-feed-search" type="search" placeholder="Find a feed">
      </div>
      <nav class="feed-nav" id="feed-nav"></nav>
      <button id="sidebar-manage-feeds" class="sidebar-manage-feeds" type="button">Manage all feeds →</button>
      <button id="refresh-all" class="refresh-all">⟳ Refresh all</button>
    </aside>

    <header class="mobile-header" id="mobile-header">
      <div class="mobile-header-bar">
        <button class="mobile-brand" id="mobile-home" type="button" aria-label="Home">
          <span class="brand-mark" aria-hidden="true">
            <svg class="ui-icon" viewBox="0 0 24 24"><path d="M4 22h16a2 2 0 0 0 2-2V4H10v16a2 2 0 0 1-4 0V2H2v18a2 2 0 0 0 2 2Z"/><path d="M14 8h4"/><path d="M14 12h4"/><path d="M14 16h4"/></svg>
          </span>
          <span class="mobile-brand-name">Feed Reader</span>
        </button>
        <div class="mobile-header-actions">
          <button class="mobile-feeds-link" id="mobile-feeds-link" type="button" aria-expanded="false" aria-controls="mobile-feeds-panel">Feeds</button>
          <button class="mobile-search-toggle" id="mobile-search-toggle" type="button" aria-label="Search" aria-expanded="false" aria-controls="mobile-search-panel">
            <svg class="ui-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          </button>
          <button class="mobile-more-toggle" id="mobile-more-toggle" type="button" aria-label="More options" aria-expanded="false" aria-controls="mobile-more-menu">•••</button>
        </div>
      </div>
      <div class="mobile-more-menu" id="mobile-more-menu" hidden>
        <button id="mobile-lang-toggle" class="mobile-menu-row" type="button">
          <span>Language</span><span id="mobile-language-value">Switch to العربية</span>
        </button>
        <button id="mobile-theme-toggle" class="mobile-menu-row" type="button">
          <span>Appearance</span><span id="mobile-theme-value">Switch to Light</span>
        </button>
      </div>
      <div class="mobile-feeds-panel" id="mobile-feeds-panel" hidden>
        <div class="mobile-feed-search">
          <svg class="ui-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <input id="mobile-feed-search" type="search" placeholder="Find a feed">
        </div>
        <div class="mobile-quick-feeds" id="mobile-quick-feeds"></div>
        <button class="mobile-manage-feeds" id="mobile-manage-feeds" type="button">Manage all feeds →</button>
      </div>
      <div class="mobile-search-panel" id="mobile-search-panel" hidden>
        <svg class="ui-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="mobile-search" type="search" placeholder="Search">
      </div>
    </header>

    <div class="pull-refresh" id="pull-refresh" aria-hidden="true">
      <span class="pull-refresh-ring" aria-hidden="true"></span>
    </div>

    <button id="mobile-catch-me-up" class="mobile-catch-up icon-label" type="button">
      <span class="ai-badge" aria-hidden="true">AI</span><span>Catch Me Up</span>
    </button>

    <main class="main">
      <header class="main-header">
        <h1 class="view-title"><span id="view-name">All Feeds</span> <span class="view-count" id="view-count"></span></h1>
        <div class="header-controls">
          <button id="catch-me-up" class="ctl-btn catch-me-up icon-label" type="button"><span class="ai-badge" aria-hidden="true">AI</span><span>Catch Me Up</span></button>
          <div class="search">
            <span class="search-icon">🔍</span>
            <input id="search" type="search" placeholder="Search">
          </div>
          <button id="lang-toggle" class="ctl-btn" title="Switch language">AR</button>
          <button id="theme-toggle" class="ctl-btn" title="Toggle dark mode">☾</button>
        </div>
      </header>

      <section class="cards" id="cards">
        <p class="state">Loading…</p>
      </section>

    </main>

    <main class="feed-manager" id="feed-manager" hidden>
      <div class="feed-manager-heading">
        <button class="feed-manager-back" id="feed-manager-back" type="button">← Back</button>
        <div>
          <h1 id="feed-manager-title">Manage Feeds</h1>
          <p id="feed-manager-subtitle">Add, find, or remove your subscriptions.</p>
        </div>
      </div>
      <form class="feed-manager-add" id="feed-manager-add-form">
        <input id="feed-manager-url" type="url" placeholder="Add feed URL…" required>
        <button id="feed-manager-add-button" type="submit" aria-label="Add feed" hidden>+</button>
      </form>
      <p class="add-error" id="feed-manager-error" hidden></p>
      <div class="feed-manager-search">
        <svg class="ui-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="feed-manager-search" type="search" placeholder="Search all feeds">
      </div>
      <div class="feed-manager-list" id="feed-manager-list"></div>
    </main>
  </div>

  <button id="scroll-top" class="scroll-top" type="button" aria-label="Back to top" hidden>
    <svg class="scroll-top-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
      <path d="M12 5l-7 7 1.4 1.4 4.6-4.6V20h2V8.8l4.6 4.6L19 12z"></path>
    </svg>
    <span class="scroll-top-label">Head to the top!</span>
  </button>

  <div class="modal" id="modal" hidden>
    <div class="modal-backdrop" id="modal-backdrop"></div>
    <div class="modal-panel" role="dialog" aria-modal="true">
      <button class="modal-close" id="modal-close" aria-label="Close">✕</button>
      <div class="modal-content" id="modal-content"></div>
    </div>
  </div>

  <script src="app.js?v=20260715-48"></script>
</body>
</html>
